name: Release

# Build, publish to PyPI, and create a GitHub Release whenever a version tag
# (vX.Y.Z) is pushed. The version itself comes from the tag via setuptools-scm.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history + tags so setuptools-scm can derive the version.
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Validate metadata
        run: |
          python -m pip install --upgrade twine
          twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  pypi-publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # PyPI API token stored as the PYPI_API_TOKEN repo secret
          # (Settings > Secrets and variables > Actions).
          password: ${{ secrets.PYPI_API_TOKEN }}

  github-release:
    name: GitHub Release
    # Publish to PyPI first, then create the GitHub Release — so the Release page
    # only appears once the package is actually live on PyPI (no dangling release
    # pointing at a version that failed to upload).
    needs: [build, pypi-publish]
    runs-on: ubuntu-latest
    permissions:
      # Needed to create the release and upload the built artifacts to it.
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
