name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch/PR to save runner minutes.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    # Guard against a hung GUI test blocking the runner for hours; the suite
    # normally finishes in ~2 minutes.
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        exclude:
          # macOS + Python 3.11 hangs in a Tk GUI test (mainloop never exits on
          # that runner's Tcl/Tk build); macOS is still covered by 3.12 and 3.13.
          - os: macos-latest
            python-version: "3.11"

    steps:
      - uses: actions/checkout@v4
        with:
          # Tags available so setuptools-scm can version the editable install.
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Install moderngl backend (best-effort)
        # Primary View3D backend, so the 3D tests run instead of skipping. The
        # non-GL logic (factory, colours, UVs, camera/pan math) is exercised;
        # GPU-context render tests skip gracefully on headless runners.
        # Best-effort: where moderngl's glcontext has no wheel and can't build
        # (e.g. Linux on a brand-new Python), the moderngl tests skip rather than
        # fail the job.
        continue-on-error: true
        run: pip install -e ".[view3d]"

      - name: Install pyrender backend (best-effort)
        # Second View3D backend, independent of moderngl. It pulls in trimesh/
        # numpy/Pillow, so the View3D suite still runs even if moderngl could not
        # be installed above.
        continue-on-error: true
        run: pip install pyrender

      - name: Set up Tk and virtual display (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk xvfb

      - name: Run tests
        # The suite is unittest-based with camelCase files (test*.py), so
        # `unittest discover` finds them natively. On Linux it needs a display,
        # so wrap it in a virtual framebuffer; macOS/Windows have one already.
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            xvfb-run -a python -m unittest discover -s mytk/tests
          else
            python -m unittest discover -s mytk/tests
          fi
